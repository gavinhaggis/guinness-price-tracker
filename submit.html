<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit a Price – Guinness Finland</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #pubSuggestions {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--gold);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      z-index: 999;
      max-height: 220px;
      overflow-y: auto;
    }
    .suggestion-item {
      padding: 11px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: rgba(245,166,35,0.12); }
    .suggestion-name { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .suggestion-address { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    #pubSearchStatus {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 5px;
      min-height: 16px;
    }
      width: 100%;
      height: 260px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-top: 8px;
      z-index: 1;
    }
    .map-instructions {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .pin-status {
      font-size: 0.78rem;
      margin-top: 6px;
      min-height: 18px;
    }
    .pin-status.set { color: #2ecc71; }
    .pin-status.unset { color: #e74c3c; }
    .locate-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .locate-btn:hover { background: rgba(245,166,35,0.1); }
    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 18px 0 4px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 480 320" preserveAspectRatio="xMidYMid meet" rendering="crispEdges" style="display:block">
        <rect x="120" y="0" width="40" height="40" style="fill:#fbf236"/><rect x="160" y="0" width="40" height="40" style="fill:#fbf236"/><rect x="200" y="0" width="40" height="40" style="fill:#fbf236"/><rect x="240" y="0" width="40" height="40" style="fill:#fbf236"/><rect x="280" y="0" width="40" height="40" style="fill:#fbf236"/><rect x="320" y="0" width="40" height="40" style="fill:#fbf236"/><rect x="360" y="0" width="40" height="40" style="fill:#fbf236"/><rect x="400" y="0" width="40" height="40" style="fill:#fbf236"/><rect x="0" y="40" width="40" height="40" style="fill:#fbf236"/><rect x="40" y="40" width="40" height="40" style="fill:#fbf236"/><rect x="80" y="40" width="40" height="40" style="fill:#fbf236"/><rect x="120" y="40" width="40" height="40" style="fill:#fbf236"/><rect x="160" y="40" width="40" height="40" style="fill:#222034"/><rect x="200" y="40" width="40" height="40" style="fill:#222034"/><rect x="240" y="40" width="40" height="40" style="fill:#222034"/><rect x="280" y="40" width="40" height="40" style="fill:#222034"/><rect x="320" y="40" width="40" height="40" style="fill:#222034"/><rect x="360" y="40" width="40" height="40" style="fill:#222034"/><rect x="400" y="40" width="40" height="40" style="fill:#fbf236"/><rect x="440" y="40" width="40" height="40" style="fill:#fbf236"/><rect x="0" y="80" width="40" height="40" style="fill:#ffce10"/><rect x="40" y="80" width="40" height="40" style="fill:#222034"/><rect x="80" y="80" width="40" height="40" style="fill:#222034"/><rect x="120" y="80" width="40" height="40" style="fill:#222034"/><rect x="160" y="80" width="40" height="40" style="fill:#222034"/><rect x="200" y="80" width="40" height="40" style="fill:#222034"/><rect x="240" y="80" width="40" height="40" style="fill:#222034"/><rect x="280" y="80" width="40" height="40" style="fill:#222034"/><rect x="320" y="80" width="40" height="40" style="fill:#222034"/><rect x="360" y="80" width="40" height="40" style="fill:#222034"/><rect x="400" y="80" width="40" height="40" style="fill:#222034"/><rect x="440" y="80" width="40" height="40" style="fill:#fbf236"/><rect x="0" y="120" width="40" height="40" style="fill:#ffce10"/><rect x="40" y="120" width="40" height="40" style="fill:#ffce10"/><rect x="80" y="120" width="40" height="40" style="fill:#222034"/><rect x="120" y="120" width="40" height="40" style="fill:#222034"/><rect x="160" y="120" width="40" height="40" style="fill:#222034"/><rect x="200" y="120" width="40" height="40" style="fill:#ffce10"/><rect x="240" y="120" width="40" height="40" style="fill:#fbf236"/><rect x="280" y="120" width="40" height="40" style="fill:#222034"/><rect x="320" y="120" width="40" height="40" style="fill:#222034"/><rect x="360" y="120" width="40" height="40" style="fill:#fbf236"/><rect x="400" y="120" width="40" height="40" style="fill:#222034"/><rect x="440" y="120" width="40" height="40" style="fill:#fbf236"/><rect x="40" y="160" width="40" height="40" style="fill:#ffce10"/><rect x="80" y="160" width="40" height="40" style="fill:#ffce10"/><rect x="120" y="160" width="40" height="40" style="fill:#222034"/><rect x="160" y="160" width="40" height="40" style="fill:#222034"/><rect x="200" y="160" width="40" height="40" style="fill:#222034"/><rect x="240" y="160" width="40" height="40" style="fill:#fbf236"/><rect x="280" y="160" width="40" height="40" style="fill:#222034"/><rect x="320" y="160" width="40" height="40" style="fill:#222034"/><rect x="360" y="160" width="40" height="40" style="fill:#fbf236"/><rect x="400" y="160" width="40" height="40" style="fill:#222034"/><rect x="440" y="160" width="40" height="40" style="fill:#fbf236"/><rect x="80" y="200" width="40" height="40" style="fill:#ffce10"/><rect x="120" y="200" width="40" height="40" style="fill:#ffce10"/><rect x="160" y="200" width="40" height="40" style="fill:#222034"/><rect x="200" y="200" width="40" height="40" style="fill:#222034"/><rect x="240" y="200" width="40" height="40" style="fill:#222034"/><rect x="280" y="200" width="40" height="40" style="fill:#222034"/><rect x="320" y="200" width="40" height="40" style="fill:#222034"/><rect x="360" y="200" width="40" height="40" style="fill:#222034"/><rect x="400" y="200" width="40" height="40" style="fill:#222034"/><rect x="440" y="200" width="40" height="40" style="fill:#fbf236"/><rect x="120" y="240" width="40" height="40" style="fill:#ffce10"/><rect x="160" y="240" width="40" height="40" style="fill:#ffce10"/><rect x="200" y="240" width="40" height="40" style="fill:#222034"/><rect x="240" y="240" width="40" height="40" style="fill:#222034"/><rect x="280" y="240" width="40" height="40" style="fill:#222034"/><rect x="320" y="240" width="40" height="40" style="fill:#222034"/><rect x="360" y="240" width="40" height="40" style="fill:#222034"/><rect x="400" y="240" width="40" height="40" style="fill:#fbf236"/><rect x="440" y="240" width="40" height="40" style="fill:#fbf236"/><rect x="160" y="280" width="40" height="40" style="fill:#ffce10"/><rect x="200" y="280" width="40" height="40" style="fill:#ffce10"/><rect x="240" y="280" width="40" height="40" style="fill:#ffce10"/><rect x="280" y="280" width="40" height="40" style="fill:#ffce10"/><rect x="320" y="280" width="40" height="40" style="fill:#ffce10"/><rect x="360" y="280" width="40" height="40" style="fill:#ffce10"/><rect x="400" y="280" width="40" height="40" style="fill:#ffce10"/>
      </svg>
      <h1><span>Guinness</span> Finland</h1>
    </div>
    <nav class="header-nav">
      <a href="index.html">← Map</a>
    </nav>
  </header>

  <div class="submit-container">
    <h2>Submit a Pint Price</h2>
    <p class="subtitle">Had a Guinness? Let Finland know what you paid. 🍺</p>

    <div class="form-group">
      <label for="submitterName">Your Name <span style="color:var(--muted);font-size:0.75rem">(optional)</span></label>
      <input type="text" id="submitterName" placeholder="e.g. Mikko" maxlength="40" autocomplete="off" />
    </div>

    <div class="form-group" style="position:relative">
      <label for="pubName">Pub Name</label>
      <input type="text" id="pubName" placeholder="e.g. The Dubliner" maxlength="80" autocomplete="off" />
      <div id="pubSuggestions"></div>
      <div id="pubSearchStatus"></div>
    </div>

    <div class="form-group">
      <label for="city">City</label>
      <select id="city">
        <option value="" disabled selected>Select a city...</option>
        <option>Helsinki</option>
        <option>Espoo</option>
        <option>Vantaa</option>
        <option>Tampere</option>
        <option>Turku</option>
        <option>Oulu</option>
        <option>Jyväskylä</option>
        <option>Lahti</option>
        <option>Kuopio</option>
        <option>Pori</option>
        <option>Rovaniemi</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="price">Price (€)</label>
      <div class="price-input-wrap">
        <span class="currency">€</span>
        <input type="number" id="price" placeholder="0.00" min="1" max="30" step="0.10" />
      </div>
    </div>

    <!-- ── Location: Map Pin ── -->
    <div class="form-group">
      <label>Pin the Pub on the Map</label>
      <p class="map-instructions">Tap the map to drop a pin on the pub's exact location.</p>
      <div id="pin-map"></div>
      <button class="locate-btn" id="locateBtn">📍 Use My Current Location</button>
      <div class="pin-status unset" id="pinStatus">No pin set yet</div>
    </div>

    <!-- ── Location: Google Maps link (alternative) ── -->
    <div class="divider">or paste a Google Maps link</div>
    <div class="form-group">
      <label for="gmapsLink">Google Maps Link <span style="color:var(--muted);font-size:0.75rem">(optional)</span></label>
      <input type="url" id="gmapsLink" placeholder="https://maps.google.com/..." autocomplete="off" />
      <div class="map-instructions">Open Google Maps, find the pub, tap Share → Copy link, paste here.</div>
    </div>

    <!-- Honeypot -->
    <div class="hp-field">
      <input type="text" id="hp" tabindex="-1" autocomplete="off" />
    </div>

    <button class="submit-btn" id="submitBtn">Submit Price</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="submit.js"></script>
</body>
</html>
